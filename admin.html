<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 모드 | 형식 & 다운</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div id="app">
        <!-- 로그인 화면 -->
        <div id="login-section" class="container">
            <h2>관리자 로그인</h2>
            <form id="login-form">
                <input type="email" id="email" placeholder="이메일" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit">로그인</button>
                <p id="login-error" class="error-msg"></p>
            </form>
        </div>

        <!-- 대시보드 화면 -->
        <div id="dashboard-section" class="container hidden">
            <header class="dashboard-header">
                <h2>관리자 대시보드</h2>
                <button id="logout-btn" class="btn-outline">로그아웃</button>
            </header>

            <div class="tabs">
                <button class="tab-btn active" data-target="tab-gallery">갤러리 관리</button>
                <button class="tab-btn" data-target="tab-guestbook">방명록 관리</button>
                <button class="tab-btn" data-target="tab-rsvp">참석자 통계</button>
            </div>

            <!-- 갤러리 탭 -->
            <section id="tab-gallery" class="card tab-content active">
                <h3>파일 관리 (갤러리 업로드)</h3>
                <div class="upload-area">
                    <input type="file" id="file-input" multiple accept="image/*">
                    <button id="upload-btn">업로드 시작</button>
                </div>
                <p id="upload-status"></p>
                
                <h4>업로드된 파일 목록</h4>
                <ul id="file-list" class="file-list"></ul>
            </section>

            <!-- 방명록 탭 -->
            <section id="tab-guestbook" class="card tab-content">
                <h3>방명록 관리</h3>
                <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">삭제된 방명록은 복구할 수 없습니다.</p>
                <ul id="admin-guestbook-list" class="file-list"></ul>
            </section>

            <!-- 참석자(RSVP) 탭 -->
            <section id="tab-rsvp" class="card tab-content">
                <h3>참석 여부 (RSVP) 현황</h3>
                <div class="rsvp-stats">
                    <div class="stat-box">
                        <span class="stat-label">참석 의사</span>
                        <strong class="stat-val text-primary" id="rsvp-attend-count">0</strong>명
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">동반인 합계</span>
                        <strong class="stat-val text-primary" id="rsvp-companion-count">0</strong>명
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">총 참석 예상</span>
                        <strong class="stat-val text-accent" id="rsvp-total-count" style="color:var(--primary); font-size: 1.5em;">0</strong>명
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">불참</span>
                        <strong class="stat-val text-danger" id="rsvp-absent-count" style="color:#d9534f;">0</strong>명
                    </div>
                </div>
                <h4>상세 명단</h4>
                <div style="overflow-x: auto;">
                    <table class="rsvp-table">
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>참석여부</th>
                                <th>동반인</th>
                                <th>제출일</th>
                            </tr>
                        </thead>
                        <tbody id="admin-rsvp-list"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>
    <script type="module" src="admin.js"></script>
</body>
</html>
