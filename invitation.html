<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리의 소중한 초대</title>
    <link rel="stylesheet" href="invitation.css">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header reveal">
            <div class="top-line"></div>
            <p class="top-date">2026 . 04 . 22</p>
            <h1 class="title">The Wedding</h1>
            <p class="names"><span>형식</span> <span class="amp">&</span> <span>다운</span></p>
            <div class="bottom-line"></div>
        </header>

        <section class="main-image reveal">
            <div class="img-wrapper">
                <img src="img/KakaoTalk_20260422_000845968.jpg" alt="Main Photo">
            </div>
        </section>

        <section class="invitation-text reveal">
            <div class="quote">“</div>
            <p class="intro">
                서로 다른 두 사람이 만나<br>
                하나의 꿈을 꾸기 시작했습니다.<br>
                저희의 소중한 시작의 자리에<br>
                따뜻한 축복을 더해주시면 감사하겠습니다.
            </p>
            <div class="quote rotate">“</div>
        </section>

        <section class="gallery reveal">
            <h2 class="section-title">Gallery</h2>
            <div class="gallery-grid">
                <div class="grid-item tall"><img src="img/KakaoTalk_20260422_000845968_01.jpg" alt="Gallery 1"></div>
                <div class="grid-item"><img src="img/KakaoTalk_20260422_000845968_02.jpg" alt="Gallery 2"></div>
                <div class="grid-item"><img src="img/KakaoTalk_20260422_000845968_03.jpg" alt="Gallery 3"></div>
                <div class="grid-item wide"><img src="img/KakaoTalk_20260422_000845968_04.jpg" alt="Gallery 4"></div>
            </div>
        </section>

        <section class="info reveal">
            <div class="info-card">
                <div class="info-item">
                    <h3>Date</h3>
                    <p>2026년 4월 22일 수요일 오후 1시</p>
                </div>
                <div class="info-divider"></div>
                <div class="info-item">
                    <h3>Location</h3>
                    <p>행복한 예식장 루비홀</p>
                </div>
            </div>
        </section>

        <footer class="footer reveal">
            <a href="index.html" class="home-btn">← Back to Main</a>
        </footer>
    </div>

    <script>
        // 간단한 스크롤 애니메이션
        const observerOptions = {
            threshold: 0.1
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    </script>
</body>
</html>
